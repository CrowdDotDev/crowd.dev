name=debezium-postgres
connector.class=io.debezium.connector.postgresql.PostgresConnector
tasks.max=1

database.hostname=db
database.port=5432
database.user=postgres
database.password=example
database.dbname=crowd-web
database.server.name=server

plugin.name=pgoutput
slot.name=debezium_slot
publication.name=dbz_publication

# Include multiple tables (comma-separated)
table.include.list=public.activityRelations,public.collections

topic.naming.strategy=io.debezium.schema.SchemaTopicNamingStrategy
topic.prefix=debezium

transforms=removePrefix
transforms.removePrefix.type=org.apache.kafka.connect.transforms.RegexRouter
transforms.removePrefix.regex=debezium\\.public\\.(.*)
transforms.removePrefix.replacement=$1

# Only include the 'after' field (full row after the change)
include.schema.changes=false
incremental.snapshot.enabled=true
provide.transaction.metadata=false

# Ensure only 'after' data is included
transforms=unwrap
transforms.unwrap.type=io.debezium.transforms.ExtractNewRecordState

# Kafka history topic
database.history.kafka.bootstrap.servers=kafka:9092
database.history.kafka.topic=schema-changes.postgres

# Data format settings
value.converter=org.apache.kafka.connect.json.JsonConverter
value.converter.schemas.enable=false
key.converter=org.apache.kafka.connect.storage.StringConverter
key.converter.schemas.enable=false

# Optional settings
tombstones.on.delete=false